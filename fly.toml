app = "aegis-food-marketplace"
primary_region = "mad"
kill_signal = "SIGINT"
kill_timeout = 30

[build]
  dockerfile = "Dockerfile.prod"

[env]
  PYTHONUNBUFFERED            = "1"
  PYTHONDONTWRITEBYTECODE     = "1"
  ENVIRONMENT                 = "production"
  LOG_LEVEL                   = "info"
  WORKERS                     = "2"
  JWT_ALGORITHM               = "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES = "1440"
  NOTIFICATIONS_ENABLED       = "true"

[http_service]
  internal_port        = 8000
  force_https          = true
  auto_stop_machines   = true
  auto_start_machines  = true
  min_machines_running = 0
  processes            = ["app"]

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 500
    soft_limit = 250

[[http_service.checks]]
  grace_period = "15s"
  interval     = "30s"
  method       = "GET"
  path         = "/health"
  protocol     = "http"
  timeout      = "10s"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"
