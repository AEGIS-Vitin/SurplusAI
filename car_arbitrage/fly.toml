# Fly.io configuration for Car Arbitrage Pro.
#
# Setup:
#   fly launch --no-deploy --copy-config --name car-arbitrage-<your-suffix>
#   fly volumes create car_arbitrage_data --size 1 --region mad
#   fly secrets set CAR_ARBITRAGE_TELEGRAM_BOT_TOKEN=...
#   fly secrets set CAR_ARBITRAGE_TELEGRAM_CHAT_ID=...
#   fly secrets set OPENLANE_COOKIE="..."   # optional
#   fly deploy
app = "car-arbitrage"
primary_region = "mad"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  PORT = "8080"
  CAR_ARBITRAGE_DB = "/data/car_arbitrage.sqlite3"
  CAR_ARBITRAGE_FRONTEND_DIR = "/app/frontend"

[[mounts]]
  source = "car_arbitrage_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 50
    soft_limit = 25

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
