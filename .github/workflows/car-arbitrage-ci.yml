name: car-arbitrage CI

on:
  push:
    branches: [main]
    paths:
      - 'car_arbitrage/**'
      - '.github/workflows/car-arbitrage-ci.yml'
  pull_request:
    paths:
      - 'car_arbitrage/**'
      - '.github/workflows/car-arbitrage-ci.yml'

defaults:
  run:
    working-directory: car_arbitrage/backend

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: car_arbitrage/backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff)
        run: |
          ruff check app/ tests/ --select=E,F,W,I --ignore=E501,E731

      - name: Run tests
        env:
          PYTHONPATH: .
        run: pytest tests/ -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: car_arbitrage
    steps:
      - uses: actions/checkout@v4

      - name: Docker build (no push)
        run: docker build -f backend/Dockerfile -t car-arbitrage:ci .
